services:

  vib-scanner:
    build: ./scanner
    container_name: vib-scanner
    restart: unless-stopped
    volumes:
      # Remove this line when using DOCKER_HOST=tcp://... (remote daemon)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - vib-trivy-cache:/root/.cache/trivy
    environment:
      - VICTORIAMETRICS_URL=${VICTORIAMETRICS_URL:-http://vib-victoriametrics:8428}
      - SCAN_INTERVAL_HOURS=${SCAN_INTERVAL_HOURS:-6}
      - SCAN_ON_STARTUP=${SCAN_ON_STARTUP:-true}
      - SEVERITY_FILTER=${SEVERITY_FILTER:-UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL}
      - IGNORE_UNFIXED=${IGNORE_UNFIXED:-false}
      - TRIVY_TIMEOUT=${TRIVY_TIMEOUT:-300}
      - ADDITIONAL_IMAGES=${ADDITIONAL_IMAGES:-}
      - AIB_BASE_URL=${AIB_BASE_URL:-}
      - AIB_API_TOKEN=${AIB_API_TOKEN:-}
      - DOCKER_HOST=${DOCKER_HOST:-}
    networks:
      - vib
    depends_on:
      - vib-victoriametrics

  vib-victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: vib-victoriametrics
    restart: unless-stopped
    ports:
      - "${VICTORIAMETRICS_PORT:-8429}:8428"
    volumes:
      - vib-victoriametrics-data:/storage
    command:
      - --storageDataPath=/storage
      - --retentionPeriod=${VICTORIAMETRICS_RETENTION:-90d}
      - --httpListenAddr=:8428
    networks:
      - vib

  vib-grafana:
    image: grafana/grafana:latest
    container_name: vib-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/vib-overview.json
    volumes:
      - vib-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - vib
    depends_on:
      - vib-victoriametrics

networks:
  vib:
    name: vib

volumes:
  vib-victoriametrics-data:
  vib-grafana-data:
  vib-trivy-cache:
