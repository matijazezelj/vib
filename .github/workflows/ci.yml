name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Compose model
        run: docker compose config >/tmp/compose.yml
      - name: Python syntax
        run: |
          files=$(git ls-files '*.py')
          if [ -n "$files" ]; then python -m py_compile $files; fi
      - name: Build local images
        run: |
          docker compose build
